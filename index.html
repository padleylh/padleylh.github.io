<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Static Blog</title>
  <meta name="description" content="A clean static blog template for GitHub Pages." />
  <style>
    :root {
      --bg: #f7f7fb;
      --surface: #ffffff;
      --surface-2: #f1f3f9;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --brand: #2563eb;
      --brand-2: #1d4ed8;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 20px;
      --max: 1120px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 24%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .wrap {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(14px);
      background: rgba(247, 247, 251, 0.78);
      border-bottom: 1px solid rgba(229, 231, 235, 0.8);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--brand), #7c3aed);
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 900;
    }

    .links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .links a:hover { color: var(--text); }

    .hero {
      padding: 72px 0 34px;
    }

    .hero-card {
      background: radial-gradient(circle at top right, rgba(37, 99, 235, 0.14), transparent 28%),
                  linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,255,255,0.88));
      border: 1px solid rgba(229, 231, 235, 0.9);
      box-shadow: var(--shadow);
      border-radius: 28px;
      padding: 42px;
    }

    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--brand-2);
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2.2rem, 5vw, 4.4rem);
      line-height: 1.05;
      letter-spacing: -0.05em;
      max-width: 12ch;
    }

    .hero p {
      margin: 0;
      max-width: 65ch;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      padding: 12px 18px;
      font-weight: 700;
      border: 1px solid transparent;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: white;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);
    }
    .btn-secondary {
      background: white;
      border-color: var(--border);
      color: var(--text);
    }

    .meta-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .meta-box {
      background: rgba(255,255,255,0.86);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
    }

    .meta-box strong {
      display: block;
      font-size: 1.2rem;
      margin-bottom: 4px;
    }

    main { padding: 18px 0 72px; }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin: 24px 0 18px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 1.6rem;
      letter-spacing: -0.03em;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      max-width: 56ch;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-bottom: 18px;
    }

    .search, .filter {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      border-radius: 14px;
      padding: 13px 14px;
      font: inherit;
      outline: none;
    }

    .search:focus, .filter:focus {
      border-color: rgba(37, 99, 235, 0.5);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .posts {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 18px;
    }

    .post {
      grid-column: span 4;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 100%;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
